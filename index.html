<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting… — Bitcoin Charlotte</title>
  <meta name="robots" content="noindex">

  <!-- No-JS fallback: meta refresh preserves the path but NOT the hash.
       The JS path below handles the hash correctly when JS is enabled.
       This fallback sends users straight to the default Bitcoin Charlotte picks. -->
  <meta http-equiv="refresh" content="0; url=https://bitcoinwallet.guide/#w=muun,strike,bitkey&c=Rc4_T8NADAXwvZ_ibdCBi9QJdaMgJAYm2CqGa-I2Vu7s6uxLlG-PlP4b7We9n397MkIshP2OvVUWvPexJHWnJ_t77t3P26Y5XLL2FgUtpzUKtZozSUcdppgSuQV86CRJYxdCWK32P154oEuPbZuGZWSnYMs6ZGreN69vX59ruOJQZ1whROnQx5EQYZWdoEeo91RuFy8qaYZRGbklC6v9d63ycHKtElrNzdJsA59hfJJ6tqXaiDD10VGN5XRX2ZB4ILAgkRm8j4INMkv1BdmxDzQ_mMMyh0lL6po1jlrgPSGrOVqVkYRJ_Eq2tRCmOC8fuRa6u0nlBKeSwz8">

  <link rel="canonical" href="https://bitcoinwallet.guide/">

  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #0d1117; color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    body { display: flex; align-items: center; justify-content: center; }
    .wrap { text-align: center; padding: 24px; }
    h1 { color: #f7931a; font-size: 1.5rem; margin: 0 0 8px; font-weight: 600; }
    p  { margin: 0; color: #8b949e; font-size: 0.95rem; }
    a  { color: #f7931a; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Redirecting to BitcoinWallet.Guide…</h1>
    <p>If you're not redirected, <a id="manual" href="https://bitcoinwallet.guide/">click here</a>.</p>
  </div>

  <script>
    // Redirect rules:
    //   1) If the user arrived with a hash (#w=...&c=...) — preserve it exactly.
    //      That's how QR-encoded share URLs work: they bake the picks into the hash.
    //   2) If the user arrived with no hash (bare subdomain visit) — send them to
    //      the default Bitcoin Charlotte curated picks (Muun + Strike + Bitkey).
    // Hashes don't get sent to the server, so this can only happen client-side.
    (function () {
      var apex = "https://bitcoinwallet.guide/";
      // Default share URL: Bitcoin Charlotte's curated picks.
      // Update this constant if Bitcoin Charlotte changes its default recommendation.
      var defaultHash = "#w=muun,strike,bitkey&c=Rc4_T8NADAXwvZ_ibdCBi9QJdaMgJAYm2CqGa-I2Vu7s6uxLlG-PlP4b7We9n397MkIshP2OvVUWvPexJHWnJ_t77t3P26Y5XLL2FgUtpzUKtZozSUcdppgSuQV86CRJYxdCWK32P154oEuPbZuGZWSnYMs6ZGreN69vX59ruOJQZ1whROnQx5EQYZWdoEeo91RuFy8qaYZRGbklC6v9d63ycHKtElrNzdJsA59hfJJ6tqXaiDD10VGN5XRX2ZB4ILAgkRm8j4INMkv1BdmxDzQ_mMMyh0lL6po1jlrgPSGrOVqVkYRJ_Eq2tRCmOC8fuRa6u0nlBKeSwz8";

      var hash = window.location.hash || "";
      var search = window.location.search || "";

      // If the visitor brought their own hash, keep it. Otherwise inject the default.
      var dest = apex + search + (hash || defaultHash);

      document.getElementById("manual").href = dest;
      // Use replace() so the redirect doesn't pollute browser history / back button.
      window.location.replace(dest);
    })();
  </script>
</body>
</html>
